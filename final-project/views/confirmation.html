<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - MonoMuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <script src="../static/script.js" defer></script>
</head>
<body class="form-page" onload="addYear(); displayConfirmation();">
    <div class="container">
        <header class="header">
        </header>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="nav_bar" id="navMenu">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Buy Tickets</a>
            <a href="checkout.html">Checkout</a>
        </nav>
        <main class="main">
            <div class="confirmation-container">
                <div class="confirmation-icon">✓</div>
                <h1>Order Confirmed</h1>
                <p class="confirmation-message">Thank you for your purchase!</p>

                <div class="confirmation-details">
                    <div class="detail-row">
                        <span class="detail-label">Total:</span>
                        <span class="detail-value" id="confirmTotal">$0.00</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date:</span>
                        <span class="detail-value" id="confirmDate">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Name:</span>
                        <span class="detail-value" id="confirmName">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email:</span>
                        <span class="detail-value" id="confirmEmail">-</span>
                    </div>
                </div>

                <p class="confirmation-note">
                    An invoice will be sent to your email shortly. No payment is required at this time.
                </p>

                <a href="../index.html" class="cta-button">Return to Home</a>
            </div>
        </main>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
</html>
