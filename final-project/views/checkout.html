<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Monomuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <script src="../static/script.js" defer></script>
</head>
<body class="form-page" onload="addYear()">
    <div class="container">
        <header class="header">
        </header>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="nav_bar" id="navMenu">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Buy Tickets</a>
            <a href="checkout.html">Checkout</a>
        </nav>
        <main class="main">
            <h1>Checkout</h1>

            <p>Purchase your tickets!</p>

            <form id="checkoutForm" onsubmit="event.preventDefault(); submitCheckout();">
                <label for="checkoutName">Name:</label>
                <input type="text" id="checkoutName" name="name" required>

                <label for="checkoutEmail">Email:</label>
                <input type="email" id="checkoutEmail" name="email" required>

                <label for="checkoutTicketType">Ticket Type:</label>
                <select id="checkoutTicketType" name="ticketType" required onchange="calculateCheckoutTotal()">
                    <option value="">Select ticket type</option>
                    <option value="25">General - $25.00</option>
                    <option value="15">Student - $15.00</option>
                    <option value="10">Member - $10.00</option>
                </select>

                <label for="checkoutQuantity">Quantity:</label>
                <input type="number" id="checkoutQuantity" name="quantity" min="1" value="1" required oninput="calculateCheckoutTotal()">

                <div id="checkoutTotalPrice">
                    Total: $0.00
                </div>

                <input type="submit" value="Complete Purchase">
            </form>
        </main>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
</html>
